---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: latest
serverless_language: node
polling_url: |
  {%- assign current_month = 0 | days_ago | date: "%-m" | plus: 0 -%}
  {%- assign current_year = 0 | days_ago | date: "%Y" | plus: 0 -%}
  https://api.github.com/user
  https://api.github.com/users/{{ github_username }}/settings/billing/usage/summary?product=copilot
  https://api.github.com/users/{{ github_username }}/settings/billing/usage/summary?product=copilot&month={% if current_month == 1 %}12{% else %}{{ current_month | minus: 1 }}{% endif %}&year={% if current_month == 1 %}{{ current_year | minus: 1 }}{% else %}{{ current_year }}{% endif %}
  https://api.github.com/users/{{ github_username }}/settings/billing/usage
  https://api.github.com/users/{{ github_username }}/settings/billing/ai_credit/usage
polling_headers: accept=application/vnd.github+json&authorization=Bearer%20{{ github_access_token }}&x-github-api-version=2026-03-10
polling_body: 
id: 298373
custom_fields:
- keyname: author_bio
  name: About This Plugin
  field_type: author_bio
  description: Show your GitHub Copilot AI Credit usage for the month.
  github_url: https://github.com/stephenyeargin/trmnl-gh-copilot-usage
  learn_more_url: https://github.com/features/copilot
  email_address: stephen@yearg.in
  category: programming,productivity
- keyname: github_access_token
  field_type: password
  name: GitHub Access Token
  description: Fine-grained PAT must have Plan (read) user permission
  placeholder: github_pat_xxxxxxxxxxxx_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  optional: false
- keyname: github_username
  field_type: string
  name: GitHub Username
  description: Username for the account that owns the Copilot plan billed by this token
  placeholder: octocat
  optional: false
- keyname: github_ai_credit_budget
  field_type: number
  name: AI Credits Budget
  description: Number of AI Credits included in your monthly plan (1 AI Credit = $0.01)
  placeholder: 1000
  default: 1000
  optional: false
- keyname: github_table_view
  field_type: select
  name: Table View
  options:
  - Model Usage: model_usage
  - Billing History: billing_history
  - None: none
  default: model_usage
  optional: true
- keyname: github_show_previous_month
  field_type: boolean
  name: Show Previous Month Consumption
  description: When enabled, shows a second meter for the prior month
  default: false
  optional: true
name: GitHub Copilot Usage
refresh_interval: 30
