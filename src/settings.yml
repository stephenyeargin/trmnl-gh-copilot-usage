---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
framework_version: latest
static_data: ''
polling_verb: get
polling_url: 'https://api.vercel.app/blog'
polling_headers: 'content-type=application/json'
name: Plugin Template
refresh_interval: 1440
custom_fields:
- keyname: author_bio
  name: About This Plugin
  field_type: author_bio
  description: This is template text you should probably update 😁
  github_url: https://github.com/
  learn_more_url: https://trmnl.com/
  email_address: email@example.com
- keyname: example_string
  field_type: string
  name: A Configurable String
  description: Save some data here for use in URLs or controlling the display
  placeholder: An Example Value
- keyname: example_secret
  field_type: password
  name: A Secret String
  description: You should mask any sensitive information, like API keys
  placeholder: an-example-value

